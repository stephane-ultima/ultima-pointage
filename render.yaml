services:
  - type: web
    name: ultima-pointage
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py --seed
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: "10000"
      - key: SEED_DB
        value: "1"
    disk:
      name: ultima-data
      mountPath: /data
      sizeGB: 1
